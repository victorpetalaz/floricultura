{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        
        <div class="card shadow mt-4 border-primary">
            <div class="card-header bg-primary text-white py-3">
                <h4 class="mb-0 fw-bold">{{ title }}</h4>
            </div>
            
            <div class="card-body p-4">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-3">
                            <label for="{{ field.id_for_label }}" class="form-label fw-bold text-primary">
                                {{ field.label }}
                            </label>
                            
                            {{ field }}
                            
                            {% if field.errors %}
                                <div class="text-danger mt-1 small fw-bold">
                                    {% for error in field.errors %}{{ error }}{% endfor %}
                                </div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    
                    <hr class="my-4 border-secondary">
                    
                    <div class="d-flex justify-content-end gap-3">
                        <a href="{% url 'storefront' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                        <button type="submit" class="btn btn-success px-4 fw-bold">Save Flower</button>
                    </div>
                </form>
            </div>
        </div>
        
    </div>
</div>
{% endblock %}
