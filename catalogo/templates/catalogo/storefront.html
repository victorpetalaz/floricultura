<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowers4U - Storefront</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1E1E1E;
            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
            --primary-blue: #3B82F6;
            --primary-hover: #2563EB;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--card-bg);
            padding: 1.5rem 2rem;
            border-bottom: 2px solid var(--primary-blue);
            text-align: center;
        }

        header h1 {
            margin: 0;
            color: var(--primary-blue);
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background-color: #2D2D2D;
        }

        .card-content {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-title {
            margin: 0 0 0.5rem 0;
            font-size: 1.25rem;
        }

        .card-price {
            color: var(--primary-blue);
            font-weight: bold;
            font-size: 1.5rem;
            margin: 0 0 1.5rem 0;
        }

        .btn {
            display: block;
            width: 100%;
            background-color: var(--primary-blue);
            color: white;
            text-align: center;
            padding: 0.75rem;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: background-color 0.2s;
            border: none;
            cursor: pointer;
            margin-top: auto;
            box-sizing: border-box;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .out-of-stock {
            color: #EF4444;
            font-weight: bold;
            text-align: center;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <header>
        <h1>Flowers4U</h1>
    </header>

    <main class="container">
        <div class="grid">
            {% for flower in flowers %}
            <div class="card">
                {% if flower.image %}
                    <img src="{{ flower.image.url }}" alt="{{ flower.name }}" class="card-img">
                {% else %}
                    <div class="card-img" style="display:flex; align-items:center; justify-content:center; color: var(--text-muted)">
                        No image
                    </div>
                {% endif %}
                
                <div class="card-content">
                    <h2 class="card-title">{{ flower.name }}</h2>
                    <p class="card-price">$ {{ flower.price }}</p>
                    
                    {% if flower.stock > 0 %}
                        <button class="btn">Add to Cart</button>
                    {% else %}
                        <p class="out-of-stock">Out of Stock</p>
                    {% endif %}
                </div>
            </div>
            {% empty %}
            <p style="text-align: center; width: 100%; color: var(--text-muted);">
                No flowers available at the moment.
            </p>
            {% endfor %}
        </div>
    </main>
</body>
</html>
