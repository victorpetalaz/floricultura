{% extends 'base.html' %}

{% block title %}Storefront{% endblock %}

{% block content %}
<style>
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 1.5rem;
    }
    .card {
        background-color: var(--card-bg);
        border-radius: 8px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }
    .card-img {
        width: 100%;
        height: 250px;
        object-fit: cover;
    }
    .card-content { padding: 1.5rem; }
    .card-price { color: var(--primary-blue); font-weight: bold; font-size: 1.2rem; }
</style>

<div class="grid">
    {% for flower in flowers %}
    <div class="card">
        {% if flower.image %}<img src="{{ flower.image.url }}" class="card-img">{% endif %}
        <div class="card-content">
            <h3>{{ flower.name }}</h3>
            <p class="card-price">$ {{ flower.price }}</p>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
