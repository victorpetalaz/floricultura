{% extends 'base.html' %}

{% block title %}Confirm Deletion{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        
        <div class="card border-danger shadow mt-5">
            <div class="card-header bg-danger text-white text-center py-3">
                <h4 class="mb-0 fw-bold">Are you absolutely sure?</h4>
            </div>
            
            <div class="card-body text-center p-5">
                <h5 class="card-title text-light">You are about to delete:</h5>
                <p class="display-6 text-primary fw-bold my-4">{{ flower.name }}</p>
                <p class="text-muted mb-4">
                    This action cannot be undone. The item will be permanently removed from the catalog database.
                </p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'storefront' %}" class="btn btn-secondary px-4">Cancel</a>
                        <button type="submit" class="btn btn-danger px-4 fw-bold">Yes, Delete it</button>
                    </div>
                </form>
            </div>
        </div>
        
    </div>
</div>
{% endblock %}
