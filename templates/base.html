<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowers4U - {% block title %}{% endblock %}</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1E1E1E;
            --text-main: #F3F4F6;
            --primary-blue: #3B82F6;
            --primary-hover: #2563EB;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }

        nav {
            background-color: var(--card-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-blue);
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            margin-left: 1.5rem;
            font-weight: 500;
        }

        nav a:hover {
            color: var(--primary-blue);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-blue) !important;
            margin-left: 0;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .btn-logout {
            background-color: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-logout:hover {
            background-color: #ef4444;
            color: white;
        }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'storefront' %}" class="logo">Flowers4U</a>
        <div>
            <a href="{% url 'profile' %}">View Profile</a>
            <form action="{% url 'logout' %}" method="post" style="display: inline;">
                {% csrf_token %}
                <button type="submit" class="btn-logout" style="margin-left: 1.5rem;">Logout</button>
            </form>
        </div>
    </nav>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
